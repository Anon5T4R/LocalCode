name: CI

# O `build.yml` só dispara em TAG. Sem este workflow, um push na branch não
# passava por compilador nenhum: erro de tipo ou código que só compila no
# Windows só aparecia na hora do release, com a tag já criada.
#
# Este job NÃO baixa os sidecars (rust-analyzer, gopls, Dart SDK, llama) —
# são centenas de MB e o que interessa aqui é compilar, não empacotar.
#
# Mas eles não podem simplesmente faltar: o build script do Tauri VALIDA os
# globs de `bundle.resources` já no `cargo check`, e um glob que não casa com
# nada é erro fatal ("glob pattern ... path not found"), não aviso. Medido na
# primeira execução deste workflow. Por isso os dois caminhos ganham um arquivo
# de mentira só pra fazer o glob casar.

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Sidecars de mentira (só pros globs do bundle casarem)
        run: |
          mkdir -p src-tauri/binaries/llama src-tauri/lsp-packages
          echo "placeholder do CI — os binarios reais vem no build.yml" \
            > src-tauri/binaries/llama/CI-PLACEHOLDER.txt
          echo "placeholder do CI — os binarios reais vem no build.yml" \
            > src-tauri/lsp-packages/CI-PLACEHOLDER.txt

      - name: Install JS deps
        run: npm ci

      - name: Frontend build (tsc + vite)
        run: npm run build

      - name: Cargo check + tests
        working-directory: src-tauri
        run: |
          cargo check --locked
          cargo test --locked --lib
