name: CI

# O `build.yml` só dispara em TAG. Sem este workflow, um push na branch não
# passava por compilador nenhum: erro de tipo ou código que só compila no
# Windows só aparecia na hora do release, com a tag já criada.
#
# Este job NÃO baixa os sidecars (rust-analyzer, gopls, Dart SDK, llama):
# `cargo check` e `cargo test` não precisam deles — só o bundle precisa, e
# bundle é trabalho do build.yml.

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Install JS deps
        run: npm ci

      - name: Frontend build (tsc + vite)
        run: npm run build

      - name: Cargo check + tests
        working-directory: src-tauri
        run: |
          cargo check --locked
          cargo test --locked --lib
